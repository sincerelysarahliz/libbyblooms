<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Libby Blooms</title>

  <!-- fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Kalam&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f6f3cf; /* butter cream */
      color: #4a433f; /* soft charcoal */
      font-family: 'Cormorant Garamond', serif;
    }

    .title {
      text-align: center;
      font-size: 60px;
      margin-top: 80px;
      color: #8b162b; /* deep cherry */
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      font-family: 'Kalam', cursive;
      font-size: 20px;
      margin-top: 10px;
      color: #4a433f;
    }

    .fridge-container {
      width: 80%;
      max-width: 900px;
      height: 600px;
      margin: 60px auto;
      background: #fffdf8; /* warm paper */
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 14px;
      font-family: 'Kalam', cursive;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="title">Libby Blooms</div>
  <div class="subtitle">a collection of memories, dreams, and places she’s about to bloom 🌸</div>

  <div class="fridge-container">
    <div class="hint">something is about to be placed here...</div>
  </div>

</body>
</html>
