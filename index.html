<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Libby Blooms</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Kalam&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f6f3cf;
      font-family: 'Cormorant Garamond', serif;
      color: #4a433f;
    }

    .title {
      text-align: center;
      font-size: 64px;
      margin-top: 60px;
      color: #8b162b;
    }

    .subtitle {
      text-align: center;
      font-family: 'Kalam', cursive;
      margin-top: 10px;
      font-size: 18px;
    }

    /* FRIDGE */
    .fridge-container {
      width: 80%;
      max-width: 900px;
      height: 600px;
      margin: 50px auto;

      background: #fffdf8;

      border-radius: 18px;
      border: 1px solid rgba(0,0,0,0.08);

      box-shadow:
        0 40px 100px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.8);

      position: relative;
      overflow: hidden;

      padding: 20px;
    }

    /* STICKY NOTE */
    .sticky-note {
      position: absolute;
      top: 60px;
      left: 60px;

      background: #f9b6b8;
      padding: 14px 16px;

      font-family: 'Kalam', cursive;
      font-size: 16px;

      transform: rotate(-3deg);

      border-radius: 6px;

      box-shadow: 0 10px 20px rgba(0,0,0,0.15);

      cursor: pointer;

      transition: transform 0.2s ease;
    }

    .sticky-note:hover {
      transform: rotate(-3deg) scale(1.05);
    }

  </style>
</head>

<body>

  <div class="title">Libby Blooms</div>

  <div class="subtitle">
    a collection of memories, dreams, and places she’s about to bloom 🌸
  </div>

  <div class="fridge-container">

    <div class="sticky-note">
      meet me in rome 🍋
    </div>

  </div>

</body>
</html>
